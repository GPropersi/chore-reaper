name = "chore-reaper-backend"
main = "src/index.ts"
compatibility_date = "2026-07-02"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "chores.4irl.app/api/*", zone_name = "4irl.app" }
]

[[d1_databases]]
binding = "DB"
database_name = "chores4irl"
database_id = "b176c334-aa7f-42a8-8ac0-134f1a04d06b"
migrations_dir = "migrations"

[vars]
ACCESS_JWKS_URL = "https://urls4irl.cloudflareaccess.com/cdn-cgi/access/certs"
ACCESS_AUD = "d1b1f36ae53d49967e6d516a2db33f9d6be1d867150fd9c18070382187aa2c39"

# Only for one-off scripts (bootstrap-admin, seed-mock-chores) run with
# WRANGLER_ENV=production, to reach the real D1 instead of the local emulated one.
# `wrangler dev`/tests never set WRANGLER_ENV, so they stay local-only.
[env.production]

[[env.production.d1_databases]]
binding = "DB"
database_name = "chores4irl"
database_id = "b176c334-aa7f-42a8-8ac0-134f1a04d06b"
remote = true
